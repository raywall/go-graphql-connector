name: Publish Go Module

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GOWORK: "off"

concurrency:
  group: publish-go-module-main
  cancel-in-progress: false

jobs:
  validate:
    name: Validate module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate module and tests
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go test ./...
          go vet ./...

  publish:
    name: Tag and publish module
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Create next semantic version
        id: version
        shell: bash
        run: |
          existing="$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [ -n "$existing" ]; then
            next="$existing"
            should_push=false
          else
            latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
            if [ -z "$latest" ]; then
              next="v0.1.0"
            else
              version="${latest#v}"
              IFS=. read -r major minor patch <<< "$version"
              next="v${major}.${minor}.$((patch + 1))"
            fi
            should_push=true
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "should_push=$should_push" >> "$GITHUB_OUTPUT"

      - name: Push version tag
        if: steps.version.outputs.should_push == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Request module from Go proxy
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          module="$(go list -m)"
          curl --fail --retry 12 --retry-delay 10 \
            "https://proxy.golang.org/${module}/@v/${VERSION}.info"
          curl --silent --show-error --location \
            "https://pkg.go.dev/${module}@${VERSION}" >/dev/null || true
